spring.application.name=pc_backend
server.port=${PORT:8080}
server.address=0.0.0.0

# ===== Railway PostgreSQL Database Configuration =====
# For Render deployment with Railway Postgres database:
# Set DATABASE_URL env var on Render to point to your Railway Postgres

spring.datasource.url=${DATABASE_URL:${RAILWAY_POSTGRES_URL:jdbc:postgresql://${RAILWAY_POSTGRES_HOST:localhost}:${RAILWAY_POSTGRES_PORT:5432}/${RAILWAY_POSTGRES_DB:postgres}}}
spring.datasource.username=${RAILWAY_POSTGRES_USER:${SPRING_DATASOURCE_USERNAME:postgres}}
spring.datasource.password=${RAILWAY_POSTGRES_PASSWORD:${SPRING_DATASOURCE_PASSWORD:}}

spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.properties.hibernate.dialect=${SPRING_JPA_HIBERNATE_DIALECT:org.hibernate.dialect.PostgreSQLDialect}

spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.show-sql=${SPRING_JPA_SHOW_SQL:true}
spring.jpa.generate-ddl=true

spring.mail.host=${SPRING_MAIL_HOST:smtp.gmail.com}
spring.mail.port=${SPRING_MAIL_PORT:465}
spring.mail.username=${SPRING_MAIL_USERNAME:}
spring.mail.password=${SPRING_MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=${SPRING_MAIL_SMTP_AUTH:true}
spring.mail.properties.mail.smtp.starttls.enable=${SPRING_MAIL_STARTTLS_ENABLE:true}
spring.mail.properties.mail.smtp.ssl.enable=${SPRING_MAIL_SSL_ENABLE:true}

app.email=${APP_EMAIL:${SPRING_MAIL_USERNAME:}}
app.allowed.origins=${APP_ALLOWED_ORIGINS:http://localhost:3000}
app.upload-dir=${APP_UPLOAD_DIR:uploads}

callback_url=${CALLBACK_URL:http://localhost:3000/payment-success}

secret_key=${PAYSTACK_SECRET_KEY:}

jwt.secret=${JWT_SECRET:change-me-in-env-or-dotenv-12345678901234567890}
jwt.expiration=${JWT_EXPIRATION:86400000}

spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=100MB

cloudinary_cloud_name=${CLOUDINARY_CLOUD_NAME:}
cloudinary_api_key=${CLOUDINARY_API_KEY:}
cloudinary_api_secret=${CLOUDINARY_API_SECRET:}

cloudinary_url=${CLOUDINARY_URL:}

resend_api_key=${RESEND_API_KEY:}
resend_email_from=${RESEND_EMAIL_FROM:onboarding@resend.dev}