spring.application.name=pc_backend
spring.profiles.active=${SPRING_PROFILES_ACTIVE:local}
server.port=${PORT:8080}
spring.config.import=optional:file:.env.properties,optional:file:./config/.env.properties

spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.show-sql=${SPRING_JPA_SHOW_SQL:true}
spring.jpa.generate-ddl=true

spring.mail.host=${SPRING_MAIL_HOST:smtp.gmail.com}
spring.mail.port=${SPRING_MAIL_PORT:465}
spring.mail.username=${SPRING_MAIL_USERNAME:}
spring.mail.password=${SPRING_MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=${SPRING_MAIL_SMTP_AUTH:true}
spring.mail.properties.mail.smtp.starttls.enable=${SPRING_MAIL_STARTTLS_ENABLE:true}
spring.mail.properties.mail.smtp.ssl.enable=${SPRING_MAIL_SSL_ENABLE:true}

app.email=${APP_EMAIL:${SPRING_MAIL_USERNAME:}}
app.allowed.origins=${APP_ALLOWED_ORIGINS:http://localhost:3000}
app.upload-dir=${APP_UPLOAD_DIR:uploads}

callback_url=${CALLBACK_URL:http://localhost:3000/payment-success}

secret_key=${PAYSTACK_SECRET_KEY:}

jwt.secret=${JWT_SECRET:change-me-in-env-or-dotenv-12345678901234567890}
jwt.expiration=${JWT_EXPIRATION:86400000}

spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=100MB